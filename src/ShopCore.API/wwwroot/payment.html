<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment – ShopCore</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, .08);
      padding: 40px 36px;
      width: 100%;
      max-width: 460px;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #1a73e8;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #111;
      margin-bottom: 4px;
    }

    .amount-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin: 18px 0 28px;
      padding: 16px;
      background: #f8f9fa;
      border-radius: 8px;
    }

    .amount-label {
      font-size: 14px;
      color: #666;
    }

    .amount-value {
      font-size: 28px;
      font-weight: 700;
      color: #111;
    }

    .amount-currency {
      font-size: 16px;
      color: #444;
    }

    #stripe-element {
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 18px;
      background: #fff;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }

    button:hover {
      background: #1558b0;
    }

    button:disabled {
      background: #9cb8e8;
      cursor: not-allowed;
    }

    .msg {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }

    .msg.success {
      background: #e6f4ea;
      color: #1e7e34;
      display: block;
    }

    .msg.error {
      background: #fce8e6;
      color: #c5221f;
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, .4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .secure-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #888;
      margin-top: 14px;
      justify-content: center;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo">ShopCore</div>
    <h1 id="pageTitle">Complete Payment</h1>

    <div class="amount-row">
      <span class="amount-label">Amount due</span>
      <span class="amount-value" id="displayAmount">—</span>
      <span class="amount-currency" id="displayCurrency"></span>
    </div>

    <!-- Stripe card element injected here -->
    <div id="stripe-section" style="display:none">
      <div id="stripe-element"></div>
      <button id="stripeBtn" onclick="handleStripePayment()">
        Pay Now
      </button>
    </div>

    <!-- Razorpay just needs a button -->
    <div id="razorpay-section" style="display:none">
      <button id="razorpayBtn" onclick="handleRazorpayPayment()">
        Pay with Razorpay
      </button>
    </div>

    <!-- Error state (bad params) -->
    <div id="error-section" style="display:none">
      <div class="msg error" id="initError"></div>
    </div>

    <div class="msg" id="msg"></div>

    <div class="secure-badge">
      🔒 Secured by ShopCore · Payments processed by your chosen gateway
    </div>
  </div>

  <script>
    // ── Read all URL params ──────────────────────────────────────────────────
    const p = new URLSearchParams(window.location.search);
    const gateway = (p.get('gateway') || '').toLowerCase(); // "stripe" | "razorpay"
    const authToken = p.get('auth_token') || '';              // JWT for /payments/confirm
    const amountStr = p.get('amount') || '0';
    const currency = (p.get('currency') || 'INR').toUpperCase();
    const orderId = p.get('order_id') || '';                // Razorpay order id / Stripe payment-intent id
    const description = p.get('description') || 'Order payment';

    // Stripe-specific
    const publishableKey = p.get('publishable_key') || '';
    const clientSecret = p.get('client_secret') || '';

    // Razorpay-specific
    const keyId = p.get('key_id') || '';
    const prefillName = p.get('name') || '';
    const prefillEmail = p.get('email') || '';
    const prefillPhone = p.get('phone') || '';

    // Display amount
    const amountNum = parseFloat(amountStr) / 100; // amounts are in smallest unit (paise / cents)
    document.getElementById('displayAmount').textContent =
      amountNum.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    document.getElementById('displayCurrency').textContent = currency;

    // ── Route to correct gateway ─────────────────────────────────────────────
    function showError(msg) {
      document.getElementById('error-section').style.display = 'block';
      document.getElementById('initError').textContent = msg;
    }

    if (gateway === 'stripe') {
      if (!publishableKey || !clientSecret) {
        showError('Missing Stripe payment parameters. Please return to the app and retry.');
      } else {
        initStripe();
      }
    } else if (gateway === 'razorpay') {
      if (!keyId || !orderId) {
        showError('Missing Razorpay payment parameters. Please return to the app and retry.');
      } else {
        document.getElementById('razorpay-section').style.display = 'block';
      }
    } else {
      showError('Unknown or missing payment gateway. Please return to the app and retry.');
    }

    // ── Stripe ───────────────────────────────────────────────────────────────
    let stripe, cardElement;

    function initStripe() {
      const script = document.createElement('script');
      script.src = 'https://js.stripe.com/v3/';
      script.onload = () => {
        stripe = Stripe(publishableKey);
        const elements = stripe.elements();
        cardElement = elements.create('card', {
          style: {
            base: { fontSize: '16px', color: '#111', '::placeholder': { color: '#aaa' } }
          }
        });
        cardElement.mount('#stripe-element');
        document.getElementById('stripe-section').style.display = 'block';
      };
      script.onerror = () => showError('Failed to load Stripe. Please check your connection.');
      document.head.appendChild(script);
    }

    async function handleStripePayment() {
      const btn = document.getElementById('stripeBtn');
      const msg = document.getElementById('msg');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Processing…';
      msg.className = 'msg';

      const { paymentIntent, error } = await stripe.confirmCardPayment(clientSecret, {
        payment_method: { card: cardElement }
      });

      if (error) {
        msg.textContent = error.message || 'Payment failed. Please try again.';
        msg.className = 'msg error';
        btn.disabled = false;
        btn.textContent = 'Pay Now';
        return;
      }

      if (paymentIntent && paymentIntent.status === 'succeeded') {
        await confirmWithServer('Stripe', paymentIntent.id, paymentIntent.id, null);
      } else {
        msg.textContent = 'Payment incomplete. Status: ' + (paymentIntent?.status || 'unknown');
        msg.className = 'msg error';
        btn.disabled = false;
        btn.textContent = 'Pay Now';
      }
    }

    // ── Razorpay ─────────────────────────────────────────────────────────────
    function handleRazorpayPayment() {
      const btn = document.getElementById('razorpayBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Opening checkout…';

      const script = document.createElement('script');
      script.src = 'https://checkout.razorpay.com/v1/checkout.js';
      script.onload = () => {
        const options = {
          key: keyId,
          amount: amountStr,
          currency: currency,
          name: 'ShopCore',
          description: description,
          order_id: orderId,
          prefill: { name: prefillName, email: prefillEmail, contact: prefillPhone },
          theme: { color: '#1a73e8' },
          handler: async (response) => {
            await confirmWithServer(
              'Razorpay',
              response.razorpay_order_id,
              response.razorpay_payment_id,
              response.razorpay_signature
            );
          },
          modal: {
            ondismiss: () => {
              btn.disabled = false;
              btn.textContent = 'Pay with Razorpay';
            }
          }
        };
        const rzp = new Razorpay(options);
        rzp.open();
      };
      script.onerror = () => {
        showError('Failed to load Razorpay. Please check your connection.');
        btn.disabled = false;
        btn.textContent = 'Pay with Razorpay';
      };
      document.head.appendChild(script);
    }

    // ── Shared: call /payments/confirm ───────────────────────────────────────
    async function confirmWithServer(gatewayName, gatewayOrderId, gatewayPaymentId, signature) {
      const msg = document.getElementById('msg');

      // If no auth token, we rely solely on the webhook — still show success to user
      if (!authToken) {
        showSuccess();
        return;
      }

      try {
        const body = { gateway: gatewayName, gatewayOrderId, gatewayPaymentId, signature };
        const res = await fetch('/api/v1/payments/confirm', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${authToken}`
          },
          body: JSON.stringify(body)
        });

        if (res.ok) {
          showSuccess();
        } else {
          // Webhook will still fire — safe to show success
          showSuccess('Payment received. Your order will be confirmed shortly.');
        }
      } catch {
        // Webhook will still fire — safe to show success
        showSuccess('Payment received. Your order will be confirmed shortly.');
      }
    }

    function showSuccess(text) {
      document.getElementById('stripe-section').style.display = 'none';
      document.getElementById('razorpay-section').style.display = 'none';
      const msg = document.getElementById('msg');
      msg.textContent = text || '✓ Payment successful! Your order is being processed.';
      msg.className = 'msg success';
    }
  </script>
</body>

</html>
