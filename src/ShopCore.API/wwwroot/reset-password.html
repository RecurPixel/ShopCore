<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – ShopCore</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, .08);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #1a73e8;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #111;
      margin-bottom: 4px;
    }

    p.sub {
      font-size: 14px;
      color: #666;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #333;
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 18px;
    }

    input:focus {
      border-color: #1a73e8;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }

    button:hover {
      background: #1558b0;
    }

    button:disabled {
      background: #9cb8e8;
      cursor: not-allowed;
    }

    .msg {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }

    .msg.success {
      background: #e6f4ea;
      color: #1e7e34;
      display: block;
    }

    .msg.error {
      background: #fce8e6;
      color: #c5221f;
      display: block;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo">ShopCore</div>
    <h1>Reset Your Password</h1>
    <p class="sub">Enter your email and a new password below.</p>

    <form id="resetForm">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com" required />

      <label for="password">New password</label>
      <input type="password" id="password" placeholder="Min. 8 characters" minlength="8" required />

      <label for="confirm">Confirm new password</label>
      <input type="password" id="confirm" placeholder="Repeat new password" required />

      <button type="submit" id="btn">Reset Password</button>
    </form>

    <div class="msg" id="msg"></div>
  </div>

  <script>
    // Read token from URL query string (?token=...)
    const token = new URLSearchParams(window.location.search).get('token') || '';

    if (!token) {
      const msg = document.getElementById('msg');
      msg.textContent = 'Invalid or missing reset token. Please request a new password reset link.';
      msg.className = 'msg error';
      document.getElementById('btn').disabled = true;
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      const btn = document.getElementById('btn');
      msg.className = 'msg';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (password !== confirm) {
        msg.textContent = 'Passwords do not match.';
        msg.className = 'msg error';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Resetting…';

      try {
        const res = await fetch('/api/v1/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, resetToken: token, newPassword: password })
        });

        if (res.ok || res.status === 204) {
          document.getElementById('resetForm').style.display = 'none';
          msg.textContent = 'Password reset successfully! You can now log in with your new password.';
          msg.className = 'msg success';
        } else {
          const data = await res.json().catch(() => ({}));
          msg.textContent = data?.detail || data?.title || 'Reset failed. The link may have expired. Please request a new one.';
          msg.className = 'msg error';
          btn.disabled = false;
          btn.textContent = 'Reset Password';
        }
      } catch {
        msg.textContent = 'Network error. Please check your connection and try again.';
        msg.className = 'msg error';
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    });
  </script>
</body>

</html>
